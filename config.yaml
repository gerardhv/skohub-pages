---
# see https://github.com/nextapps-de/flexsearch#tokenizer-prefix-search for options
tokenizer: "full" # strict, forward, reverse, full
custom_domain: ""
fail_on_validation: false
searchableAttributes:
  - "prefLabel" # you should not delete this one
  - "notation"
  - "altLabel"
  - "hiddenLabel"
  - "example"
  - "definition"
  - "scopeNote"
ui:
  title: "Aedes vocabulary"
  logo: "aedes.png"
  colors:
    skoHubWhite: "rgb(255, 255, 255)"

    # Primair (blauw / teal uit palette)
    skoHubDarkColor: "rgb(0, 51, 102)"        # donkerblauw
    skoHubMiddleColor: "rgb(0, 122, 204)"     # helder blauw
    skoHubLightColor: "rgb(80, 180, 220)"     # lichtblauw
    skoHubThinColor: "rgb(120, 210, 230)"     # extra licht / cyaan

    # Donkere basis
    skoHubBlackColor: "rgb(0, 0, 0)"

    # Accent (roze uit palette i.p.v. paars)
    skoHubAction: "rgb(220, 0, 120)"          # magenta/roze
    skoHubNotice: "rgb(250, 180, 50)"         # geel/oranje (origineel behouden)

    # Grijswaarden (uit linker kolom)
    skoHubDarkGrey: "rgb(100, 100, 100)"
    skoHubMiddleGrey: "rgb(180, 180, 180)"
    skoHubLightGrey: "rgb(230, 230, 230)"
  fonts:
    regular:
      font_family: "Ubuntu"
      font_style: "normal"
      font_weight: 400
      name: "ubuntu-v20-latin-regular"
    bold:
      font_family: "Ubuntu"
      font_style: "normal"
      font_weight: 700
      name: "ubuntu-v20-latin-700"
  footer:
    links:
      - title: "Aedes Datastandaarden"
        url: "https://www.aedesdatastandaarden.nl"
        target: "_blank"
        rel: "noopener noreferrer"
